version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketing_user
      POSTGRES_PASSWORD: ticketing_pass
      POSTGRES_DB: ticketing_db
    ports:
      - "5432:5432"
    volumes:
      - ticketing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing_user -d ticketing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ticketing_postgres_data:
